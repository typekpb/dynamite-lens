name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (production)
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 5

  e2e:
    name: E2E (Playwright vs docker-compose)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npm run e2e:install

      - name: Start stack (web + DynamoDB Local)
        run: docker compose up --build -d

      - name: Wait for web to be ready
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:8080/ >/dev/null; then
              echo "web is up"; exit 0
            fi
            echo "waiting for web... ($i)"; sleep 2
          done
          echo "web did not become ready"; docker compose logs; exit 1

      - name: Run E2E tests
        env:
          CI: "true"
          BASE_URL: http://localhost:8080
        run: npm run e2e

      - name: Dump compose logs on failure
        if: failure()
        run: docker compose logs

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Tear down stack
        if: always()
        run: docker compose down -v
