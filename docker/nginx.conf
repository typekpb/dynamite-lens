worker_processes  1;

events {
  worker_connections  1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  keepalive_timeout  65;
  gzip on;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;

  # Resolve upstreams at request time. Docker's embedded DNS (127.0.0.11)
  # handles internal service names like `dynamodb-local`; the public resolvers
  # handle AWS regional endpoints. Runtime resolution avoids stale-IP 502/504s
  # when the DynamoDB Local container is recreated.
  resolver 127.0.0.11 8.8.8.8 1.1.1.1 ipv6=off valid=10s;

  server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # --- Static SPA ---
    location / {
      try_files $uri $uri/ /index.html;
    }

    # --- DynamoDB Local CORS reverse proxy ---
    # Browser SDK uses endpoint "/local"; we proxy to the dynamodb-local container.
    # Override target with env DDB_LOCAL_UPSTREAM at container start if needed.
    location /local {
      if ($request_method = OPTIONS) {
        add_header Access-Control-Allow-Origin  "$http_origin" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "*" always;
        add_header Access-Control-Max-Age 86400 always;
        add_header Content-Length 0;
        add_header Content-Type "text/plain";
        return 204;
      }

      # The AWS SDK targets endpoint path "/local", which it may normalize to
      # "/local/". Collapse both to a single "/" so the DynamoDB Local (Jetty)
      # backend doesn't reject a "//" as an ambiguous empty URI segment.
      rewrite ^/local/?.*$ / break;
      proxy_pass http://dynamodb-local:8000;
      proxy_http_version 1.1;
      proxy_set_header Host dynamodb-local:8000;
      proxy_set_header Connection "";
      proxy_read_timeout 30s;
      proxy_connect_timeout 5s;

      add_header Access-Control-Allow-Origin  "$http_origin" always;
      add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
      add_header Access-Control-Allow-Headers "*" always;
      add_header Access-Control-Expose-Headers "*" always;
    }

    # --- AWS DynamoDB CORS reverse proxy ---
    # The browser SDK is configured with endpoint "/aws/<region>" (e.g. /aws/us-east-1).
    # We strip the prefix and proxy to the matching regional DynamoDB endpoint,
    # adding permissive CORS headers so the browser accepts the response.
    location ~ ^/aws/(?<aws_region>[a-z0-9-]+)/?$ {
      # Preflight
      if ($request_method = OPTIONS) {
        add_header Access-Control-Allow-Origin  "$http_origin" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "*" always;
        add_header Access-Control-Max-Age 86400 always;
        add_header Content-Length 0;
        add_header Content-Type "text/plain";
        return 204;
      }

      set $aws_upstream "https://dynamodb.$aws_region.amazonaws.com";
      proxy_pass $aws_upstream/;

      proxy_ssl_server_name on;
      proxy_set_header Host "dynamodb.$aws_region.amazonaws.com";
      proxy_set_header X-Real-IP $remote_addr;

      # Expose response to the browser regardless of origin.
      add_header Access-Control-Allow-Origin  "$http_origin" always;
      add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
      add_header Access-Control-Allow-Headers "*" always;
      add_header Access-Control-Expose-Headers "*" always;
    }
  }
}
